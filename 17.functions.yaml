- name: Functions
  hosts: local
  connection: local
  vars:
    technologies: devops,aws,shell,ansible
    tags:
      Application: payment
      Environment: dev
    listTags:
    - key: Application
      value: payment
    - key: Environment
      value: dev
  tasks:
    - name: string to list
      ansible.builtin.debug:
        msg: "List: {{ technologies | split(',') }}"

    - name: map to list
      ansible.builtin.debug:
        msg: "list: {{ tags | dict2items }}"

    - name: List into map
      ansible.builtin.debug:
        msg: "Map: {{ listTags | items2dict }}"
  
    - name: read yaml to the variable
      ansible.builtin.set_fact:
        student_yaml=" {{ lookup('file','student.yaml'| from_yaml)}}"

    - name: yaml to json
      ansible.builtin.debug:
        msg: "JSon; {{ student_yaml | to_json }}"

    - name: json to file
      ansible.builtin.copy:
        dest: ./student-json.yaml
        content: "{{ student_yaml | to_json }}"